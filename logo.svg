<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <!-- Neon Blue Glow -->
    <filter id="neonBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Neon Cyan Glow -->
    <filter id="neonCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Gradient Text -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    
    <!-- Smoke Gradient -->
    <radialGradient id="smokeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(0,212,255,0.3)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>
  
  <!-- Background smoke effect -->
  <ellipse cx="200" cy="60" rx="180" ry="50" fill="url(#smokeGrad)"/>
  
  <!-- House/Building Icon -->
  <g transform="translate(30, 25)" filter="url(#neonBlue)">
    <!-- Building outline -->
    <path d="M35 5 L65 5 L65 75 L35 75 Z" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <!-- Roof -->
    <path d="M25 5 L50 -15 L75 5" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <!-- Door -->
    <rect x="42" y="45" width="16" height="30" fill="none" stroke="#00ff88" stroke-width="2"/>
    <!-- Windows -->
    <rect x="40" y="15" width="8" height="8" fill="#00d4ff" opacity="0.5"/>
    <rect x="52" y="15" width="8" height="8" fill="#00d4ff" opacity="0.5"/>
    <rect x="40" y="28" width="8" height="8" fill="#00d4ff" opacity="0.5"/>
    <rect x="52" y="28" width="8" height="8" fill="#00d4ff" opacity="0.5"/>
    <!-- Smoke coming from chimney -->
    <path d="M60 -10 Q65 -20 60 -30 Q55 -40 60 -50" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
    <path d="M65 -8 Q70 -18 65 -28" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  </g>
  
  <!-- Cigarette Icon -->
  <g transform="translate(75, 45)" filter="url(#neonCyan)">
    <!-- Cigarette body -->
    <rect x="0" y="8" width="40" height="8" rx="2" fill="none" stroke="#00ff88" stroke-width="1.5"/>
    <!-- Filter -->
    <rect x="0" y="8" width="12" height="8" rx="2" fill="#00d4ff" opacity="0.3"/>
    <!-- Burning tip -->
    <circle cx="42" cy="12" r="3" fill="#ff6b6b" opacity="0.8"/>
    <!-- Smoke -->
    <path d="M45 8 Q50 -5 45 -15 Q40 -25 45 -35" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
    <path d="M48 6 Q53 -7 48 -17" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Text: CIGARETTE -->
  <text x="130" y="55" font-family="Rajdhani, sans-serif" font-size="36" font-weight="700" fill="url(#textGradient)" filter="url(#neonBlue)" letter-spacing="2">CIGARETTE</text>
  
  <!-- Text: HOUSE -->
  <text x="130" y="90" font-family="Rajdhani, sans-serif" font-size="42" font-weight="700" fill="#ffffff" filter="url(#neonCyan)" letter-spacing="3">HOUSE</text>
  
  <!-- Decorative line -->
  <line x1="130" y1="65" x2="370" y2="65" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  
  <!-- Subtitle -->
  <text x="130" y="108" font-family="Sora, sans-serif" font-size="10" fill="#a0aec0" letter-spacing="4">PREMIUM SMOKE</text>
</svg>
