<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#grad)" stroke-width="2" filter="url(#glow)"/>
  
  <!-- House -->
  <path d="M30 65 L30 40 L50 25 L70 40 L70 65 Z" fill="none" stroke="#00d4ff" stroke-width="2.5" filter="url(#glow)"/>
  
  <!-- Door -->
  <rect x="42" y="50" width="16" height="15" fill="none" stroke="#00ff88" stroke-width="2"/>
  
  <!-- Window -->
  <rect x="37" y="38" width="10" height="8" fill="#00d4ff" opacity="0.4"/>
  <rect x="53" y="38" width="10" height="8" fill="#00d4ff" opacity="0.4"/>
  
  <!-- Cigarette smoke integrated -->
  <path d="M65 30 Q72 20 65 10" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <path d="M68 32 Q75 22 68 12" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  
  <!-- CH Initials -->
  <text x="50" y="85" font-family="Rajdhani, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">CH</text>
</svg>
